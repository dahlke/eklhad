name: CI
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 5PM every day
    - cron: "0 19 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  collect_data:
    runs-on: ubuntu-latest
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Run the worker
      - name: Run eklhad data worker
        env:
          GOOGLE_APPLICATION_CREDENTIALS : ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          GOOGLE_ACTIONS_CREDENTIALS_JSON : ${{ secrets.GOOGLE_ACTIONS_CREDENTIALS_JSON}}
        run: |
          touch $GOOGLE_APPLICATION_CREDENTIALS
          echo $GOOGLE_ACTIONS_CREDENTIALS_JSON > $GOOGLE_APPLICATION_CREDENTIALS
          ls
          make go_get
          make go_test
          make collect_data
  testing:
    runs-on: ubuntu-latest
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Run the worker
      - name: Run eklhad JS and Go tests
        env:
          GOOGLE_APPLICATION_CREDENTIALS : ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          GOOGLE_ACTIONS_CREDENTIALS_JSON : ${{ secrets.GOOGLE_ACTIONS_CREDENTIALS_JSON}}
        run: |
          touch $GOOGLE_APPLICATION_CREDENTIALS
          echo $GOOGLE_ACTIONS_CREDENTIALS_JSON > $GOOGLE_APPLICATION_CREDENTIALS
          make go_get
          make go_test
          cd web/frontend && bun install --frozen-lockfile && bun run test --run